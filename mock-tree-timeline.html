<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mock — Timeline</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, system-ui, "DM Sans", sans-serif; }
    body {
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, rgba(255, 245, 230, 0.06), transparent 70%),
        linear-gradient(180deg, #1a1614 0%, #0d0a08 100%);
      color: #fff8f0;
      overflow: hidden;
      position: relative;
    }

    .stage {
      position: relative;
      width: min(100%, 460px);
      height: 100vh;
      margin: 0 auto;
      padding: 64px 20px 100px;
      overflow: hidden;
    }

    /* ====== Linea verticale centrale ====== */
    .timeline-track {
      position: absolute;
      left: 50%;
      top: 64px;
      bottom: 100px;
      width: 3px;
      transform: translateX(-50%);
      background: linear-gradient(180deg,
        #f5d76a 0%,    /* giallo (step 1) */
        #f5d76a 16%,
        #f9a8d4 16%,   /* rosa (step 2) */
        #f9a8d4 33%,
        #fde68a 33%,   /* lime (step 3) */
        #fde68a 50%,
        #93c5fd 50%,   /* blu (step 4) */
        #93c5fd 66%,
        #c4b5fd 66%,   /* viola (step 5) */
        #c4b5fd 83%,
        #86efac 83%,   /* verde (step 6) */
        #86efac 100%
      );
      border-radius: 999px;
      box-shadow: 0 0 12px rgba(255, 235, 200, 0.18);
      transform-origin: 50% 0%;
      animation: track-grow 0.8s cubic-bezier(0.5, 0, 0.4, 1) forwards;
      transform: translateX(-50%) scaleY(0);
    }
    @keyframes track-grow {
      to { transform: translateX(-50%) scaleY(1); }
    }

    /* Pallino START in cima */
    .start-marker {
      position: absolute;
      left: 50%;
      top: 30px;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff8e7, #f5d76a);
      box-shadow: 0 0 22px rgba(245, 215, 106, 0.55), 0 4px 10px rgba(0,0,0,0.4);
      border: 2px solid #fff;
      opacity: 0;
      animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 100ms;
    }
    @keyframes pop-in {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); }
      60%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* Pallino FINISH in fondo */
    .end-marker {
      position: absolute;
      left: 50%;
      bottom: 78px;
      transform: translate(-50%, 50%);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c5fbd0, #86efac);
      box-shadow: 0 0 18px rgba(134, 239, 172, 0.45), 0 4px 8px rgba(0,0,0,0.4);
      border: 2px solid #fff;
      opacity: 0;
      animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 1500ms;
    }

    /* ====== Step (alternati sx/dx) ====== */
    .step {
      position: absolute;
      width: 44%;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      animation: step-in 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
      animation-delay: var(--delay);
    }
    .step.left {
      right: 50%;
      padding-right: 28px;
      flex-direction: row-reverse;
      text-align: right;
    }
    .step.right {
      left: 50%;
      padding-left: 28px;
      flex-direction: row;
      text-align: left;
    }
    @keyframes step-in {
      0%   { opacity: 0; transform: translateX(var(--from, -20px)); }
      100% { opacity: 1; transform: translateX(0); }
    }
    .step.left  { --from: -20px; }
    .step.right { --from:  20px; }

    /* Cerchio dello step */
    .step-circle {
      position: relative;
      flex: 0 0 auto;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #ffffff 0%, rgba(255,255,255,0.85) 50%, var(--accent-soft, #fff8e7) 100%);
      border: 3px solid var(--accent, #d4af37);
      box-shadow:
        0 0 18px color-mix(in srgb, var(--accent, #d4af37) 35%, transparent),
        0 6px 14px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .step-circle::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid color-mix(in srgb, var(--accent, #d4af37) 25%, transparent);
      opacity: 0;
      animation: ring-pulse 2.5s ease-in-out infinite;
      animation-delay: calc(var(--delay) + 800ms);
      pointer-events: none;
    }
    @keyframes ring-pulse {
      0%   { transform: scale(0.85); opacity: 0; }
      50%  { transform: scale(1.15); opacity: 0.45; }
      100% { transform: scale(1.35); opacity: 0; }
    }
    .step:active .step-circle {
      transform: scale(0.92);
      box-shadow:
        0 0 30px color-mix(in srgb, var(--accent, #d4af37) 70%, transparent),
        0 6px 14px rgba(0,0,0,0.4);
    }
    .step-icon {
      font-size: 24px;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2));
    }

    /* Connector tratteggiato dal cerchio alla linea */
    .step-connector {
      position: absolute;
      top: 50%;
      width: 22px;
      border-top: 2px dashed color-mix(in srgb, var(--accent, #d4af37) 70%, white);
      transform: translateY(-50%);
      opacity: 0;
      animation: dash-in 0.3s ease-out forwards;
      animation-delay: calc(var(--delay) - 100ms);
    }
    .step.left  .step-connector { right: 0; }
    .step.right .step-connector { left: 0; }
    @keyframes dash-in {
      0%   { opacity: 0; transform: translateY(-50%) scaleX(0); }
      100% { opacity: 0.7; transform: translateY(-50%) scaleX(1); }
    }
    .step.left  .step-connector { transform-origin: right center; }
    .step.right .step-connector { transform-origin: left center; }

    /* Trianglino sulla linea verticale */
    .step-arrow {
      position: absolute;
      top: 50%;
      width: 0;
      height: 0;
      transform: translateY(-50%);
      opacity: 0;
      animation: arrow-in 0.3s ease-out forwards;
      animation-delay: calc(var(--delay) + 50ms);
    }
    .step.left .step-arrow {
      right: -10px;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 8px solid var(--accent, #d4af37);
    }
    .step.right .step-arrow {
      left: -10px;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-right: 8px solid var(--accent, #d4af37);
    }
    @keyframes arrow-in {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    /* Testo dello step */
    .step-text {
      flex: 1;
      min-width: 0;
    }
    .step-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: var(--accent, #d4af37);
      line-height: 1;
      margin-bottom: 2px;
      text-shadow: 0 0 14px color-mix(in srgb, var(--accent, #d4af37) 35%, transparent);
    }
    .step-sub {
      font-size: 10px;
      color: rgba(255, 250, 240, 0.55);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    /* Posizionamento verticale degli step */
    .step:nth-of-type(1) { top: 12%; }
    .step:nth-of-type(2) { top: 26%; }
    .step:nth-of-type(3) { top: 40%; }
    .step:nth-of-type(4) { top: 54%; }
    .step:nth-of-type(5) { top: 68%; }
    .step:nth-of-type(6) { top: 82%; }

    .replay {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 10px;
      color: rgba(255, 250, 240, 0.55);
      letter-spacing: 0.7px;
      text-transform: uppercase;
      opacity: 0;
      animation: pop-in 0.5s ease-out forwards;
      animation-delay: 1700ms;
    }
  </style>
</head>
<body>

  <button class="replay" onclick="location.reload()">↻ Replay</button>

  <div class="stage">
    <div class="timeline-track"></div>
    <div class="start-marker"></div>

    <!-- Step 1 — sinistra -->
    <div class="step left" style="--accent:#f5d76a; --accent-soft:#fff8e0; --delay:600ms;">
      <div class="step-text">
        <div class="step-title">Nuovo capo</div>
        <div class="step-sub">Aggiungi al guardaroba</div>
      </div>
      <div class="step-circle"><span class="step-icon">🛍️</span></div>
      <div class="step-connector"></div>
      <div class="step-arrow"></div>
    </div>

    <!-- Step 2 — destra -->
    <div class="step right" style="--accent:#f9a8d4; --accent-soft:#ffe9f5; --delay:760ms;">
      <div class="step-circle"><span class="step-icon">✨</span></div>
      <div class="step-text">
        <div class="step-title">Nuovo outfit</div>
        <div class="step-sub">Componi un look</div>
      </div>
      <div class="step-connector"></div>
      <div class="step-arrow"></div>
    </div>

    <!-- Step 3 — sinistra -->
    <div class="step left" style="--accent:#fde68a; --accent-soft:#fff9d6; --delay:920ms;">
      <div class="step-text">
        <div class="step-title">Nuova nota</div>
        <div class="step-sub">Wishlist · sarta · regali</div>
      </div>
      <div class="step-circle"><span class="step-icon">📝</span></div>
      <div class="step-connector"></div>
      <div class="step-arrow"></div>
    </div>

    <!-- Step 4 — destra -->
    <div class="step right" style="--accent:#93c5fd; --accent-soft:#dbeafe; --delay:1080ms;">
      <div class="step-circle"><span class="step-icon">⏰</span></div>
      <div class="step-text">
        <div class="step-title">Promemoria</div>
        <div class="step-sub">Lavare · ritirare · provare</div>
      </div>
      <div class="step-connector"></div>
      <div class="step-arrow"></div>
    </div>

    <!-- Step 5 — sinistra -->
    <div class="step left" style="--accent:#c4b5fd; --accent-soft:#ede9fe; --delay:1240ms;">
      <div class="step-text">
        <div class="step-title">Diario oggi</div>
        <div class="step-sub">Mood · pensieri · foto</div>
      </div>
      <div class="step-circle"><span class="step-icon">📔</span></div>
      <div class="step-connector"></div>
      <div class="step-arrow"></div>
    </div>

    <!-- Step 6 — destra -->
    <div class="step right" style="--accent:#86efac; --accent-soft:#dcfce7; --delay:1400ms;">
      <div class="step-circle"><span class="step-icon">🎒</span></div>
      <div class="step-text">
        <div class="step-title">Nuova capsule</div>
        <div class="step-sub">Pacchetto outfit a tema</div>
      </div>
      <div class="step-connector"></div>
      <div class="step-arrow"></div>
    </div>

    <div class="end-marker"></div>
  </div>

  <div class="hint">mock — timeline · ricarica per replay</div>

</body>
</html>
