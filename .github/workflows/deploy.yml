# Deploy automatico su GitHub Pages al push su main
name: Deploy PWA su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Abilita automaticamente Pages se non e' gia' configurato sul repo
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Pubblico l'intera repo escludendo cartelle non utili al sito statico
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
