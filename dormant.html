<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>Capi a riposo - Marty Outfit</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/settings.css" />
  <link rel="stylesheet" href="./css/extras.css" />
</head>
<body class="settings-page">

  <header class="settings-header">
    <a href="./index.html" class="btn-icon" aria-label="Torna all'app">←</a>
    <h1>Capi a riposo</h1>
    <span class="settings-header-spacer"></span>
  </header>

  <main class="settings-main">

    <p class="settings-hint">
      Capi che non indossi da almeno 60 giorni. Considera di dargli una chance,
      archiviarli (cantina virtuale) o venderli/regalarli.
    </p>

    <div id="dormant-stats" class="settings-row">
      <div>
        <div class="settings-row-title" id="dormant-count">—</div>
        <div class="settings-row-sub" id="dormant-value">—</div>
      </div>
      <button class="btn btn--secondary btn--sm" id="btn-export-csv">📥 CSV</button>
    </div>

    <div id="dormant-list" class="dormant-list"></div>

    <div id="dormant-empty" class="empty-state hidden" style="padding: var(--space-7) var(--space-4);">
      <div class="empty-icon">🎉</div>
      <p>Nessun capo a riposo. Tutto in rotazione!</p>
    </div>

  </main>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="./js/theme/manager.js"></script>
  <script type="module" src="./js/dormant-page.js"></script>
</body>
</html>
