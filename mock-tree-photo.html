<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mock — Sakura Foto</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; }
    body {
      background: #0a0612;
      color: #fff8f0;
      overflow: hidden;
      position: relative;
    }

    /* ====== Foto albero a tutto schermo ====== */
    .photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      /* Il "growth": l'immagine si rivela dal basso verso l'alto */
      clip-path: inset(100% 0 0 0);
      animation: grow-reveal 1.6s cubic-bezier(0.5, 0, 0.4, 1) forwards;
    }
    @keyframes grow-reveal {
      to { clip-path: inset(0 0 0 0); }
    }

    /* Vignette scura attorno per fare emergere i frutti */
    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,0.55) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.35) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      opacity: 0;
      animation: vignette-fade 1s ease-out forwards;
      animation-delay: 1.2s;
    }
    @keyframes vignette-fade { to { opacity: 1; } }

    /* Backdrop blur leggero attorno per far risaltare i frutti */
    .photo {
      filter: brightness(0.92) saturate(1.1) contrast(1.05);
    }

    /* ====== FRUTTI (uguali a v107) ====== */
    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
    }
    .fruit {
      position: absolute;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      cursor: pointer;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation:
        fruit-bloom 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
        fruit-float 4s ease-in-out infinite;
      animation-delay: var(--delay), calc(var(--delay) + 1000ms);
    }
    @keyframes fruit-bloom {
      0%   { transform: translate(-50%, -30%) scale(0); opacity: 0; }
      60%  { transform: translate(-50%, -55%) scale(1.18); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    @keyframes fruit-float {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50%      { transform: translate(-50%, -54%) scale(1.04); }
    }
    .fruit-bubble {
      position: relative;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,0.85), transparent 38%),
        radial-gradient(circle at 50% 50%, var(--accent), color-mix(in srgb, var(--accent) 60%, #1a0a1a));
      box-shadow:
        0 0 28px color-mix(in srgb, var(--accent) 65%, transparent),
        0 8px 22px rgba(0,0,0,0.55),
        inset 0 -6px 12px rgba(0,0,0,0.22),
        inset 0 4px 10px rgba(255,255,255,0.42);
      border: 2px solid rgba(255,255,255,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fruit-icon {
      font-size: 30px;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
      user-select: none;
    }
    .fruit-label {
      margin-top: 10px;
      padding: 4px 12px;
      background: rgba(20, 10, 25, 0.88);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff8f0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.6);
      white-space: nowrap;
      backdrop-filter: blur(6px);
      transform: translateY(-4px);
      opacity: 0;
      animation: label-in 0.3s ease-out forwards;
      animation-delay: calc(var(--delay) + 300ms);
    }
    @keyframes label-in {
      to { transform: translateY(0); opacity: 1; }
    }

    /* Petali che cadono */
    .falling-petal {
      position: absolute;
      font-size: 18px;
      pointer-events: none;
      animation: petal-fall 9s linear infinite;
      opacity: 0;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
      z-index: 3;
    }
    @keyframes petal-fall {
      0%   { transform: translate(0, -30px) rotate(0); opacity: 0; }
      10%  { opacity: 0.85; }
      50%  { transform: translate(-30px, 50vh) rotate(180deg); }
      90%  { opacity: 0.4; }
      100% { transform: translate(30px, 100vh) rotate(360deg); opacity: 0; }
    }

    .replay {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 8px 14px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: rgba(255, 240, 250, 0.8);
      letter-spacing: 0.7px;
      text-transform: uppercase;
      opacity: 0;
      animation: label-in 0.5s ease-out forwards;
      animation-delay: 2200ms;
      z-index: 10;
      text-shadow: 0 2px 6px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>

  <button class="replay" onclick="location.reload()">↻ Replay</button>

  <!-- FOTO sakura ad alta risoluzione (Unsplash, free for commercial) -->
  <!-- credit: photo by @yokenchan / @blakecheekk on Unsplash -->
  <img class="photo"
       src="https://images.unsplash.com/photo-1522383225653-ed111181a951?w=1200&q=80&auto=format&fit=crop"
       alt="Sakura tree" />

  <div class="vignette"></div>

  <div class="stage">
    <!-- Frutti posizionati in punti coerenti con la foto -->
    <div class="fruit" style="left:18%; top:62%; --accent:#f5d76a; --delay:1500ms;">
      <div class="fruit-bubble"><span class="fruit-icon">🛍️</span></div>
      <span class="fruit-label">Nuovo capo</span>
    </div>
    <div class="fruit" style="left:78%; top:62%; --accent:#f9a8d4; --delay:1580ms;">
      <div class="fruit-bubble"><span class="fruit-icon">✨</span></div>
      <span class="fruit-label">Nuovo outfit</span>
    </div>
    <div class="fruit" style="left:12%; top:42%; --accent:#fde68a; --delay:1680ms;">
      <div class="fruit-bubble"><span class="fruit-icon">📝</span></div>
      <span class="fruit-label">Nuova nota</span>
    </div>
    <div class="fruit" style="left:84%; top:42%; --accent:#93c5fd; --delay:1760ms;">
      <div class="fruit-bubble"><span class="fruit-icon">⏰</span></div>
      <span class="fruit-label">Promemoria</span>
    </div>
    <div class="fruit" style="left:24%; top:25%; --accent:#c4b5fd; --delay:1860ms;">
      <div class="fruit-bubble"><span class="fruit-icon">📔</span></div>
      <span class="fruit-label">Diario oggi</span>
    </div>
    <div class="fruit" style="left:72%; top:25%; --accent:#86efac; --delay:1940ms;">
      <div class="fruit-bubble"><span class="fruit-icon">🎒</span></div>
      <span class="fruit-label">Nuova capsule</span>
    </div>
  </div>

  <!-- Petali che cadono -->
  <span class="falling-petal" style="left:10%; animation-delay: 2s;">🌸</span>
  <span class="falling-petal" style="left:28%; animation-delay: 3.5s;">🌸</span>
  <span class="falling-petal" style="left:55%; animation-delay: 5s;">🌸</span>
  <span class="falling-petal" style="left:75%; animation-delay: 6.5s;">🌸</span>
  <span class="falling-petal" style="left:88%; animation-delay: 8s;">🌸</span>
  <span class="falling-petal" style="left:42%; animation-delay: 4.2s; font-size: 14px;">🌸</span>
  <span class="falling-petal" style="left:65%; animation-delay: 7.5s; font-size: 14px;">🌸</span>

  <div class="hint">mock #2 — foto sakura · ricarica per replay</div>

</body>
</html>
