<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Editor outfit - Marti Outfit</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/settings.css" />
  <link rel="stylesheet" href="./css/extras.css" />
</head>
<body class="editor-page">

  <!-- Schermata di setup modello (mostrata se imgly non e' ancora caricato) -->
  <div id="model-setup" class="model-setup hidden">
    <div class="model-setup-icon">🤖</div>
    <h2>Preparazione editor</h2>
    <p>Sto scaricando il motore di rimozione sfondo (~30 MB).</p>
    <p class="model-setup-sub">Una sola volta, poi funziona offline.</p>
    <div class="model-setup-progress">
      <div class="model-setup-bar" id="model-progress-bar"></div>
    </div>
    <div class="model-setup-percent" id="model-progress-text">0%</div>
  </div>

  <!-- Header -->
  <header class="editor-header">
    <a href="./index.html" class="btn-icon" aria-label="Annulla">✕</a>
    <h1>Editor outfit</h1>
    <button class="btn btn--primary btn--sm" id="btn-save-composition">
      Salva
    </button>
  </header>

  <!-- Canvas -->
  <main class="editor-canvas-wrapper">
    <div id="editor-canvas" class="editor-canvas">
      <!-- Gli item vengono inseriti qui come .canvas-item -->
      <div id="canvas-empty" class="canvas-empty">
        <div class="canvas-empty-icon">👇</div>
        <p>Tocca un capo qui sotto per aggiungerlo</p>
      </div>
    </div>

    <!-- Status overlay (durante elaborazione bg removal) -->
    <div id="processing-overlay" class="processing-overlay hidden">
      <div class="processing-spinner"></div>
      <div class="processing-text" id="processing-text">Elaborazione...</div>
    </div>
  </main>

  <!-- Bottom strip con tutti i capi del guardaroba -->
  <div class="editor-strip">
    <div id="editor-strip-items" class="editor-strip-items"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="./js/theme/manager.js"></script>
  <script type="module" src="./js/outfit-editor.js"></script>
</body>
</html>
