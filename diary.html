<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1f3a">
  <title>Diario · Marty Outfit</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/extras.css">
  <link rel="stylesheet" href="./css/diary.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button class="topbar-back" onclick="history.back()" aria-label="Indietro">‹</button>
      <h1 class="topbar-title">📔 Diario</h1>
      <button class="topbar-action" id="btn-wrapped" type="button" aria-label="Wrapped" title="Diary Wrapped">📊</button>
      <button class="topbar-action" id="btn-today" type="button" aria-label="Oggi">📍</button>
    </header>

    <main class="main-content">
      <section class="diary-stats" id="diary-stats">
        <div class="diary-stat">
          <div class="diary-stat-value" id="stat-streak">0</div>
          <div class="diary-stat-label">Giorni consecutivi 🔥</div>
        </div>
        <div class="diary-stat">
          <div class="diary-stat-value" id="stat-total">0</div>
          <div class="diary-stat-label">Pagine totali</div>
        </div>
        <div class="diary-stat">
          <div class="diary-stat-value" id="stat-mood">—</div>
          <div class="diary-stat-label">Mood preferito</div>
        </div>
      </section>

      <div class="diary-search">
        <input type="search" id="search-input" placeholder="🔍 Cerca per titolo, testo, tag...">
      </div>

      <div class="diary-timeline" id="diary-timeline">
        <div class="empty-state">
          <div class="empty-icon">📔</div>
          <p class="empty-text">Nessuna pagina ancora</p>
          <p class="empty-hint">Tocca + per scrivere oggi</p>
        </div>
      </div>
    </main>

    <button class="fab" id="fab-add" aria-label="Nuova pagina">+</button>
  </div>

  <script type="module" src="./js/diary-page.js"></script>
</body>
</html>
