<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>Palette Match - Marti Outfit</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/settings.css" />
  <link rel="stylesheet" href="./css/extras.css" />
</head>
<body class="settings-page">

  <header class="settings-header">
    <a href="./index.html" class="btn-icon" aria-label="Torna all'app">←</a>
    <h1>Palette Match</h1>
    <span class="settings-header-spacer"></span>
  </header>

  <main class="settings-main">

    <p class="settings-hint">
      Carica una foto di ispirazione (un dipinto, una pagina Pinterest, un paesaggio).
      L'app estrae i colori dominanti e cerca nei tuoi capi quelli che ci stanno bene.
    </p>

    <!-- Upload card -->
    <div id="palette-upload" class="palette-upload">
      <label class="palette-upload-label">
        <span class="palette-upload-icon">🎨</span>
        <span class="palette-upload-text">Tap per caricare una foto</span>
        <input type="file" id="palette-input" accept="image/*" hidden />
      </label>
    </div>

    <!-- Source preview + palette -->
    <div id="palette-result" class="hidden">
      <h2 class="settings-section-title">La tua ispirazione</h2>
      <div class="palette-source-row">
        <img id="palette-source-img" class="palette-source-img" alt="Ispirazione" />
        <div class="palette-swatches" id="palette-swatches"></div>
      </div>

      <button class="btn btn--ghost btn--block" id="btn-new-palette" style="margin-top: var(--space-3);">
        🔄 Cambia foto
      </button>

      <h2 class="settings-section-title">Capi che matchano</h2>
      <p class="settings-hint" id="palette-match-summary">⏳ Ricerca in corso...</p>

      <div id="palette-matches" class="palette-matches"></div>

      <div class="palette-cta">
        <button class="btn btn--primary btn--block" id="btn-generate-palette-outfit">
          ✨ Genera outfit da questa palette
        </button>
      </div>

      <h2 class="settings-section-title">Outfit suggerito</h2>
      <div id="palette-outfit-result"></div>

    </div>

  </main>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="./js/theme/manager.js"></script>
  <script type="module" src="./js/palette-page.js"></script>
</body>
</html>
